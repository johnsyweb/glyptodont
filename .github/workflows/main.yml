name: Ruby

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  glyptodont:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Install Glyptodont
        run: gem install glyptodont

      - name: Check TODOs
        run: glyptodont

  commit-messages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check commit messages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            before="${{ github.event.before }}"
            if [ "$before" = "0000000000000000000000000000000000000000" ] || [ -z "$before" ]; then
              range="${{ github.sha }}"
            else
              range="$before..${{ github.sha }}"
            fi
          fi
          ./script/check-commit-messages "$range"

  build:
    needs: commit-messages
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.3", "3.4", "4.0"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Mise
        uses: jdx/mise-action@v4
        with:
          tool_versions: |
            ruby ${{ matrix.ruby }}
            cmake
          cache: true

      - name: Cache Bundler
        uses: actions/cache@v5
        with:
          path: vendor/bundle
          key: bundle-${{ runner.os }}-${{ matrix.ruby }}-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            bundle-${{ runner.os }}-${{ matrix.ruby }}-

      - name: Install Bundler and gems
        run: |
          bundle config set path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Run the CI build
        run: ./script/cibuild
